name: Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zhihuidangjian
  TCR_REGISTRY: ccr.ccs.tencentyun.com
  TCR_NAMESPACE: zhihuidangjian

jobs:
  # ── Stage 1: Code Quality ────────────────────────────────────────────
  quality:
    name: Qodana Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: true
          push-fixes: 'none'

      - name: Upload Qodana SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/qodana/results/qodana.sarif.json

  # ── Stage 3: Build ───────────────────────────────────────────────────
  build:
    name: Build bootJar
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bootJar
        run: ./gradlew --no-daemon clean :server:bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/*.jar
          retention-days: 1

  # ── Stage 4: Build & Push Docker Image ───────────────────────────────
  release:
    name: Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/build/libs

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to TCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.TCR_REGISTRY }}
          username: ${{ secrets.TCR_USERNAME }}
          password: ${{ secrets.TCR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/app
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
            type=raw,value=${{ needs.build.outputs.version }}

      - name: Build and push Docker image (GHCR)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build.outputs.version }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: ${{ steps.docker-meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Push Docker image (TCR)
        shell: bash
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TCR_IMAGE="${{ env.TCR_REGISTRY }}/${{ env.TCR_NAMESPACE }}/app"

          docker pull ghcr.io/${{ env.IMAGE_NAME }}:$VERSION --platform linux/amd64

          docker tag ghcr.io/${{ env.IMAGE_NAME }}:$VERSION "$TCR_IMAGE:$VERSION"
          docker tag ghcr.io/${{ env.IMAGE_NAME }}:$VERSION "$TCR_IMAGE:latest"

          docker push "$TCR_IMAGE:$VERSION"
          docker push "$TCR_IMAGE:latest"

  # ── Summary ──────────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [ build, release ]
    if: always()
    steps:
      - name: Print release info
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pipeline | quality → build → release |" >> "$GITHUB_STEP_SUMMARY"
