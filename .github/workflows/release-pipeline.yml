name: Release Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-pipeline-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zhihuidangjian

jobs:
  # ── Stage 1: Code Audit ──────────────────────────────────────────────
  audit:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: semgrep ci --config auto --sarif > semgrep.sarif || true
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

  # ── Stage 2: Code Quality ────────────────────────────────────────────
  quality:
    name: Qodana Code Quality
    runs-on: ubuntu-latest
    needs: audit
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Qodana Scan
        uses: JetBrains/qodana-action@v2025.3.2
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }}
        with:
          pr-mode: false
          use-caches: true
          post-pr-comment: true
          use-annotations: true
          upload-result: false
          push-fixes: 'none'

  # ── Stage 3: Build ───────────────────────────────────────────────────
  build:
    name: Build bootJar
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Resolve version
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build bootJar
        run: ./gradlew --no-daemon clean :server:bootJar -x test

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: server/build/libs/*.jar
          retention-days: 1

  # ── Stage 4: API Automated Test ──────────────────────────────────────
  api-test:
    name: API Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zhdj
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/password
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd="wget --no-verbose --tries=1 --spider http://127.0.0.1:7474 || exit 1"
          --health-interval=10s
          --health-timeout=10s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/build/libs

      - name: Initialize MySQL schema
        run: |
          mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS zhdj CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          mysql -h127.0.0.1 -uroot -proot zhdj < ddl.sql
          mysql -h127.0.0.1 -uroot -proot zhdj < .github/sql/ci-seed.sql

      - name: Start application
        env:
          DATABASE_URL: jdbc:mysql://127.0.0.1:3306/zhdj?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          DATABASE_USERNAME: root
          DATABASE_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DATABASE: 0
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          AI_KEY: ${{ secrets.AI_KEY || 'dummy-key' }}
          TENCENT_CLOUD_COS_ENABLED: "false"
        run: |
          mkdir -p build
          nohup java -jar server/build/libs/server.jar > build/api-test-app.log 2>&1 &

      - name: Wait for application
        run: bash .github/scripts/wait-for-app.sh http://127.0.0.1:9000/api/school/all 180

      - name: Run API tests
        run: node .github/scripts/api-smoke-openapi.mjs
        env:
          AUTH_TEST_CAPTCHA_CODE: CI8888
          TEST_LOGIN_PASSPORT: ci_smoke_user
          TEST_SCHOOL_LOGIN_PASSPORT: ci_smoke_school
          TEST_MANAGER_LOGIN_PASSPORT: ci_smoke_manager
          TEST_LOGIN_PASSWORD: Test@1234

      - name: Upload app log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-logs
          path: build/api-test-app.log
          if-no-files-found: ignore

  # ── Stage 5: Build & Push Docker Image ───────────────────────────────
  release:
    name: Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: api-test
    steps:
      - uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: server-jar
          path: server/build/libs

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ needs.build.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

  # ── Summary ──────────────────────────────────────────────────────────
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [ build, release ]
    if: always()
    steps:
      - name: Print release info
        run: |
          echo "## Release Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Item | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Trigger | \`${{ github.event_name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Commit | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Pipeline | audit → quality → build → api-test → release |" >> "$GITHUB_STEP_SUMMARY"
