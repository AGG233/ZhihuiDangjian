name: CI

on:
  push:
    branches:
      - product
      - dev
    paths:
      - 'services/**'
      - 'server/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - product
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Compile, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: none
        ports:
          - 7687:7687

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches/
            ~/.gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/libs.versions.toml', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile sources
        run: ./gradlew --no-daemon compileJava

      - name: Run tests
        run: ./gradlew --no-daemon test

      - name: Build server bootJar
        run: ./gradlew --no-daemon clean :server:bootJar -x test

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/**
          if-no-files-found: ignore
