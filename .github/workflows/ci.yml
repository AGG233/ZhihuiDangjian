name: CI

on:
  pull_request:
    branches:
      - product
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Compile, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: zhdj
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: none
        ports:
          - 7687:7687

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.gradle/caches/
            ~/.gradle/wrapper/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/libs.versions.toml', '**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Compile sources
        run: ./gradlew --no-daemon compileJava

      - name: Run tests with coverage
        run: ./gradlew --no-daemon test integrationTest jacocoRootReport jacocoRootCoverageVerification

      - name: Upload coverage to Codacy
        if: always()
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: build/reports/jacoco/jacocoRootReport/jacocoRootReport.xml

      - name: Build server bootJar
        run: ./gradlew --no-daemon :server:bootJar -x test

      - name: Seed smoke database
        env:
          MYSQL_PWD: root
        run: |
          mysql -h127.0.0.1 -P3306 -uroot zhdj < ddl.sql
          mysql -h127.0.0.1 -P3306 -uroot zhdj < .github/sql/ci-seed.sql

      - name: Start server for API smoke
        env:
          SPRING_PROFILES_ACTIVE: prod
          DATABASE_URL: jdbc:mysql://127.0.0.1:3306/zhdj?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
          DATABASE_USERNAME: root
          DATABASE_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_DATABASE: 0
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USERNAME: neo4j
          NEO4J_PASSWORD: password
          AI_KEY: dummy-key
          AUTH_TEST_CAPTCHA_CODE: CI8888
          TENCENT_CLOUD_COS_ENABLED: false
          AI_MCP_ENABLED: false
        run: |
          java -jar server/build/libs/server.jar > server/build/api-smoke-app.log 2>&1 &
          echo $! > server/build/api-smoke-app.pid

      - name: Wait for app
        id: wait-for-app
        continue-on-error: true
        run: bash .github/scripts/wait-for-app.sh http://127.0.0.1:9000/v3/api-docs

      - name: Dump app logs on failure
        if: steps.wait-for-app.outcome != 'success'
        run: cat server/build/api-smoke-app.log || true

      - name: Check wait result
        if: steps.wait-for-app.outcome != 'success'
        run: exit 1

      - name: Run OpenAPI smoke
        env:
          API_SMOKE_BASE_URL: http://127.0.0.1:9000
          AUTH_TEST_CAPTCHA_CODE: CI8888
          TEST_LOGIN_PASSWORD: Test@1234
          TEST_LOGIN_PASSPORT: ci_smoke_user
          TEST_SCHOOL_LOGIN_PASSPORT: ci_smoke_school
          TEST_MANAGER_LOGIN_PASSPORT: ci_smoke_manager
        run: node .github/scripts/api-smoke-openapi.mjs

      - name: Stop API smoke app
        if: always()
        run: |
          if [ -f server/build/api-smoke-app.pid ]; then
            kill "$(cat server/build/api-smoke-app.pid)" || true
          fi

      - name: Upload build reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            **/build/reports/**
            server/build/api-smoke-app.log
          if-no-files-found: ignore
