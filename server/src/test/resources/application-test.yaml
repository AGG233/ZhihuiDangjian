spring:
  application:
    name: server
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: password
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: dummy-key
      chat:
        options:
          model: deepseek-chat

auth:
  captcha:
    test-code: TEST8888

tencent-cos:
  - platform: tencent-cos
    enable-storage: false
    secret-id: test
    secret-key: test
    region: ap-guangzhou
    bucket: test-bucket
    domain: http://localhost
    base-path: /
