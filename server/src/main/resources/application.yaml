spring:
  application:
    name: server
  profiles:
    default: dev
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      connection-timeout: 2000
      minimum-idle: 4
      maximum-pool-size: 16
      idle-timeout: 30000
      username: ${DATABASE_USERNAME}
      password: ${DATABASE_PASSWORD}
    url: ${DATABASE_URL:jdbc:mysql://127.0.0.1:3306/zhihuidangjian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      database: ${REDIS_DATABASE}
  neo4j:
    uri: ${NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USERNAME:neo4j}
      password: ${NEO4J_PASSWORD:password}
  ai:
    openai:
      base-url: https://api.deepseek.com
      api-key: ${AI_KEY:dummy-key}
      chat:
        options:
          model: deepseek-chat

auth:
  captcha:
    test-code: ${AUTH_TEST_CAPTCHA_CODE:}

tencent-cos:
  - platform: tencent-cos                               # 存储平台标识
    enable-storage: ${TENCENT_CLOUD_COS_ENABLED:true}   # 启用存储
    secret-id: ${COS_SECRET_ID:}
    secret-key: ${COS_SECRET_KEY:}
    region: ${COS_REGION:ap-guangzhou}
    bucket: ${COS_BUCKET:}
    domain: ${COS_LINK:}
    base-path: /

server:
  port: 9000

knife4j:
  enable: true
  basic:
    enable: true
    username: smdj
    password: testsmdj123
  setting:
    language: zh_cn
logging:
  level:
    root: DEBUG
