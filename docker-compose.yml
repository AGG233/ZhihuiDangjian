services:
  app:
    image: ghcr.io/agg233/zhihuidangjian:latest
    container_name: zhihuidangjian
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=jdbc:mysql://172.17.0.1:3306/zhihuidangjian?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - DATABASE_USERNAME=root
      - DATABASE_PASSWORD=your_password
      - REDIS_HOST=172.17.0.1
      - REDIS_PORT=6379
      - REDIS_DATABASE=0
      - AI_KEY=your_deepseek_api_key
      - COS_SECRET_ID=your_cos_secret_id
      - COS_SECRET_KEY=your_cos_secret_key
      - COS_REGION=ap-guangzhou
      - COS_BUCKET=your-bucket-name
      - COS_LINK=https://your-bucket-name.cos.ap-guangzhou.myqcloud.com
    volumes:
      - ./logs:/app/logs
